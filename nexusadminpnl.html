<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Login Card */
        .login-card {
            background: rgba(0,0,0,0.85);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
            border: 1px solid #ff0000;
        }
        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
        }
        .btn {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }
        .btn-sm { padding: 8px 16px; font-size: 12px; width: auto; }
        .btn-outline { background: transparent; border: 1px solid #ff0000; color: #ff0000; }
        .btn-success { background: linear-gradient(135deg, #00cc66, #009944); }
        .btn-warning { background: linear-gradient(135deg, #ff8800, #cc6600); }
        .btn-danger { background: linear-gradient(135deg, #ff0000, #cc0000); }
        
        .dashboard { display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #ff000033; }
        .stat-number { font-size: 32px; font-weight: bold; color: #ff0000; }
        .stat-label { font-size: 12px; color: #aaa; margin-top: 8px; }
        
        .glass-card { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 24px; margin-bottom: 24px; border: 1px solid #ff000033; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #ff0000; border-left: 4px solid #ff0000; padding-left: 15px; display: flex; align-items: center; gap: 12px; }
        .section-title i { color: #ff0000; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); }
        .input-group input, .input-group select, .input-group textarea {
            padding: 12px 15px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
        }
        
        .tabs-container { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; padding: 8px; background: rgba(0,0,0,0.5); border-radius: 60px; }
        .tab-btn { padding: 10px 20px; background: transparent; border: none; color: rgba(255,255,255,0.6); cursor: pointer; border-radius: 40px; font-weight: 600; transition: all 0.2s; }
        .tab-btn.active { background: linear-gradient(135deg, #ff0000, #cc0000); color: white; }
        .tab-panel { display: none; animation: fadeIn 0.3s ease; }
        .tab-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .list-container { max-height: 500px; overflow-y: auto; }
        .list-item { background: rgba(20,20,20,0.7); border: 1px solid rgba(255,0,0,0.2); border-radius: 16px; padding: 14px; margin-bottom: 10px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; margin: 2px; }
        .badge-active { background: rgba(0,255,136,0.2); color: #00ff88; }
        .badge-expired { background: rgba(255,0,0,0.2); color: #ff0000; }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid rgba(255,0,0,0.2); border-top-color: #ff0000; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) { .container { padding: 12px; } .stats-grid { grid-template-columns: repeat(2,1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Panel -->
        <div id="loginPanel">
            <div class="login-card">
                <h2 style="margin-bottom: 20px;">✦ NEXUS ADMIN</h2>
                <input type="text" id="adminUser" placeholder="Username" value="admin">
                <input type="password" id="adminPass" placeholder="Password">
                <button class="btn" style="width:100%;" onclick="adminLogin()">Login</button>
                <div id="loginMsg"></div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;">
                <h1><span style="color:#ff0000;">✦ NEXUS</span> ADMIN PANEL</h1>
                <button class="btn btn-outline btn-sm" onclick="adminLogout()">Logout</button>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- Tabs -->
            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('keys')">🔑 Key Management</button>
                <button class="tab-btn" onclick="switchTab('resellers')">👥 Resellers</button>
                <button class="tab-btn" onclick="switchTab('coins')">💰 Coin Management</button>
                <button class="tab-btn" onclick="switchTab('announcements')">📢 Announcements</button>
                <button class="tab-btn" onclick="switchTab('broadcast')">📡 Broadcast</button>
                <button class="tab-btn" onclick="switchTab('maintenance')">🔧 Maintenance</button>
            </div>

            <!-- Tab: Key Management -->
            <div id="tabKeys" class="tab-panel active">
                <div class="glass-card">
                    <div class="section-title"><i class="fas fa-plus-circle"></i> Create New Key</div>
                    <div class="form-grid">
                        <div class="input-group"><label>User ID</label><input type="text" id="userId" placeholder="User ID"></div>
                        <div class="input-group"><label>Days</label><input type="number" id="days" value="0"></div>
                        <div class="input-group"><label>Hours</label><input type="number" id="hours" value="3"></div>
                        <div class="input-group"><label>Minutes</label><input type="number" id="minutes" value="0"></div>
                        <div class="input-group"><label>Max Devices</label><input type="number" id="maxDevices" value="1"></div>
                        <div class="input-group"><label>Custom Key</label><input type="text" id="customKey" placeholder="Optional"></div>
                    </div>
                    <button class="btn" onclick="addKey()">Create Key</button>
                    <div id="addMsg"></div>
                </div>

                <div class="glass-card">
                    <div class="section-title"><i class="fas fa-list"></i> All Keys <button class="btn btn-danger btn-sm" style="float:right;" onclick="deleteAllKeys()">Delete All</button></div>
                    <div class="list-container" id="keysList">Loading...</div>
                </div>
            </div>

            <!-- Tab: Resellers -->
            <div id="tabResellers" class="tab-panel">
                <div class="glass-card">
                    <div class="section-title"><i class="fas fa-user-plus"></i> Create Reseller</div>
                    <div class="form-grid">
                        <div class="input-group"><label>Username</label><input type="text" id="resellerUser" placeholder="Reseller username"></div>
                        <div class="input-group"><label>Password</label><input type="password" id="resellerPass" placeholder="Password"></div>
                        <div class="input-group"><label>Initial Coins</label><input type="number" id="initialCoins" value="0"></div>
                    </div>
                    <button class="btn" onclick="createReseller()">Create Reseller</button>
                    <div id="createResellerMsg"></div>
                </div>

                <div class="glass-card">
                    <div class="section-title"><i class="fas fa-users"></i> Reseller List</div>
                    <div class="list-container" id="resellersList">Loading...</div>
                </div>
            </div>

            <!-- Tab: Coin Management -->
            <div id="tabCoins" class="tab-panel">
                <div class="glass-card">
                    <div class="section-title"><i class="fas fa-coins"></i> Add/Remove Coins</div>
                    <div class="form-grid">
                        <div class="input-group"><label>User ID</label><input type="text" id="coinUserId" placeholder="User ID"></div>
                        <div class="input-group"><label>Amount (+/-)</label><input type="number" id="coinAmount" value="0"></div>
                        <div class="input-group"><label>Reason</label><input type="text" id="coinReason" placeholder="Reason"></div>
                    </div>
                    <button class="btn btn-success" onclick="addCoins()"><i class="fas fa-plus-circle"></i> Add Coins</button>
                    <div id="coinMsg"></div>
                </div>

                <div class="glass-card">
                    <div class="section-title"><i class="fas fa-history"></i> Coin Transactions</div>
                    <div class="input-group" style="margin-bottom: 16px;"><input type="text" id="filterUserId" placeholder="Filter by User ID (optional)"></div>
                    <button class="btn btn-sm btn-outline" onclick="loadCoinTransactions()">Search</button>
                    <div class="list-container" id="transactionsList" style="margin-top: 16px;">Loading...</div>
                </div>
            </div>

            <!-- Tab: Announcements -->
            <div id="tabAnnouncements" class="tab-panel">
                <div class="glass-card">
                    <div class="section-title"><i class="fas fa-plus-circle"></i> Create Announcement</div>
                    <div class="form-grid">
                        <div class="input-group"><label>Title</label><input type="text" id="announcementTitle" placeholder="Title"></div>
                        <div class="input-group"><label>Type</label><select id="announcementType"><option value="info">Info</option><option value="warning">Warning</option><option value="success">Success</option></select></div>
                    </div>
                    <div class="input-group"><label>Content</label><textarea id="announcementContent" rows="3" placeholder="Content"></textarea></div>
                    <button class="btn" onclick="createAnnouncement()">Create Announcement</button>
                    <div id="announcementMsg"></div>
                </div>

                <div class="glass-card">
                    <div class="section-title"><i class="fas fa-list"></i> Announcements</div>
                    <div class="list-container" id="announcementsList">Loading...</div>
                </div>
            </div>

            <!-- Tab: Broadcast -->
            <div id="tabBroadcast" class="tab-panel">
                <div class="glass-card">
                    <div class="section-title"><i class="fas fa-broadcast-tower"></i> Broadcast Message</div>
                    <div class="form-grid">
                        <div class="input-group"><label>Title</label><input type="text" id="broadcastTitle" placeholder="Title"></div>
                        <div class="input-group"><label>Target</label><select id="broadcastTarget"><option value="all">All Users</option><option value="reseller">Resellers Only</option><option value="user">Regular Users Only</option></select></div>
                    </div>
                    <div class="input-group"><label>Message</label><textarea id="broadcastMessage" rows="3" placeholder="Message"></textarea></div>
                    <button class="btn btn-warning" onclick="sendBroadcast()">Send Broadcast</button>
                    <div id="broadcastMsg"></div>
                </div>

                <div class="glass-card">
                    <div class="section-title"><i class="fas fa-history"></i> Broadcast History</div>
                    <div class="list-container" id="broadcastHistoryList">Loading...</div>
                </div>
            </div>

            <!-- Tab: Maintenance -->
            <div id="tabMaintenance" class="tab-panel">
                <div class="glass-card">
                    <div class="section-title"><i class="fas fa-tools"></i> Maintenance Mode</div>
                    <div id="maintenanceStatus"></div>
                    <div class="form-grid">
                        <div class="input-group"><input type="text" id="maintenanceTime" placeholder="Estimated time (30 minutes)"></div>
                        <div class="input-group"><input type="text" id="maintenanceMessage" placeholder="Custom message"></div>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn btn-warning" onclick="enableMaintenance()">Enable Maintenance</button>
                        <button class="btn btn-success" onclick="disableMaintenance()">Disable Maintenance</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="loading-spinner"></div></div>

    <script>
        const BASE_API = 'https://system-nexus-key.vercel.app';
        let token = null;

        function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function showToast(msg, type) { alert(msg); }

        async function adminLogin() {
            const username = document.getElementById('adminUser').value;
            const password = document.getElementById('adminPass').value;
            showLoading(true);
            try {
                const res = await fetch(`${BASE_API}/api/admin/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    localStorage.setItem('admin_token', token);
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    loadStats(); loadKeys(); loadResellers(); loadAnnouncements(); loadBroadcastHistory(); checkMaintenanceStatus();
                } else { document.getElementById('loginMsg').innerHTML = `<div class="alert alert-error">${data.error}</div>`; }
            } catch(err) { document.getElementById('loginMsg').innerHTML = `<div class="alert alert-error">Connection error</div>`; }
            finally { showLoading(false); }
        }

        function adminLogout() { localStorage.removeItem('admin_token'); token = null; document.getElementById('loginPanel').style.display = 'block'; document.getElementById('dashboard').style.display = 'none'; }

        async function loadStats() {
            try {
                const res = await fetch(`${BASE_API}/api/admin/stats`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('statsGrid').innerHTML = `
                        <div class="stat-card"><div class="stat-number">${data.stats.totalKeys}</div><div class="stat-label">Total Keys</div></div>
                        <div class="stat-card"><div class="stat-number">${data.stats.activeKeys}</div><div class="stat-label">Active Keys</div></div>
                        <div class="stat-card"><div class="stat-number">${data.stats.totalUsers}</div><div class="stat-label">Total Users</div></div>
                        <div class="stat-card"><div class="stat-number">${data.stats.resellers || 0}</div><div class="stat-label">Resellers</div></div>
                        <div class="stat-card"><div class="stat-number">${data.stats.totalCoins || 0}</div><div class="stat-label">Total Coins</div></div>
                    `;
                }
            } catch(e) { console.error(e); }
        }

        async function loadKeys() {
            try {
                const res = await fetch(`${BASE_API}/api/admin/keys`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
                const data = await res.json();
                if (data.success && data.keys) {
                    document.getElementById('keysList').innerHTML = data.keys.map(k => `
                        <div class="list-item">
                            <div><strong>🔑 ${k.key_text}</strong> <span class="badge ${k.status === 'active' ? 'badge-active' : 'badge-expired'}">${k.status}</span></div>
                            <div style="font-size: 12px;">User: ${k.user_id} | Expires: ${new Date(k.expiry_ms).toLocaleString()}</div>
                            <button class="btn btn-sm btn-danger" onclick="deleteKey('${k.key_text}')">Delete</button>
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        async function addKey() {
            const userId = document.getElementById('userId').value;
            const days = parseInt(document.getElementById('days').value) || 0;
            const hours = parseInt(document.getElementById('hours').value) || 0;
            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            const maxDevices = parseInt(document.getElementById('maxDevices').value) || 1;
            const keyText = document.getElementById('customKey').value;
            if (!userId) { alert('User ID required'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${BASE_API}/api/admin/add-key`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, userId, days, hours, minutes, maxDevices, keyText }) });
                const data = await res.json();
                if (data.success) { alert(`Key created: ${data.key}`); loadStats(); loadKeys(); }
                else { alert(data.error); }
            } catch(e) { alert('Error'); } finally { showLoading(false); }
        }

        async function deleteKey(key) { if(confirm('Delete?')){ showLoading(true); await fetch(`${BASE_API}/api/admin/delete-key`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, key}) }); loadKeys(); loadStats(); showLoading(false); } }
        async function deleteAllKeys() { if(confirm('Delete ALL keys?')){ showLoading(true); const { data } = await fetch(`${BASE_API}/api/admin/keys`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token}) }).then(r=>r.json()); if(data.keys){ for(const k of data.keys){ await fetch(`${BASE_API}/api/admin/delete-key`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, key:k.key_text}) }); } } loadKeys(); loadStats(); showLoading(false); } }

        async function loadResellers() {
            try {
                const res = await fetch(`${BASE_API}/api/admin/resellers`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
                const data = await res.json();
                if (data.success && data.resellers) {
                    document.getElementById('resellersList').innerHTML = data.resellers.map(r => `
                        <div class="list-item">
                            <div><strong>👤 ${r.user_id}</strong> <span class="badge badge-active">Reseller</span></div>
                            <div>💰 Coins: ${r.coins || 0} | Keys: ${r.keys_generated || 0}</div>
                            <div style="margin-top: 8px;">
                                <button class="btn btn-sm btn-success" onclick="quickAddCoins('${r.user_id}')">+ Add Coins</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        async function createReseller() {
            const username = document.getElementById('resellerUser').value;
            const password = document.getElementById('resellerPass').value;
            const initialCoins = parseInt(document.getElementById('initialCoins').value) || 0;
            if (!username || !password) { alert('Username and password required'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${BASE_API}/api/admin/create-reseller`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, username, password, initialCoins }) });
                const data = await res.json();
                if (data.success) { alert(data.message); loadResellers(); }
                else { alert(data.error); }
            } catch(e) { alert('Error'); } finally { showLoading(false); }
        }

        async function addCoins() {
            const userId = document.getElementById('coinUserId').value;
            const amount = parseInt(document.getElementById('coinAmount').value);
            const reason = document.getElementById('coinReason').value;
            if (!userId) { alert('User ID required'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${BASE_API}/api/admin/add-coins`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, userId, amount, reason }) });
                const data = await res.json();
                if (data.success) { alert(`Coins updated! New balance: ${data.newBalance}`); loadResellers(); loadCoinTransactions(); }
                else { alert(data.error); }
            } catch(e) { alert('Error'); } finally { showLoading(false); }
        }

        function quickAddCoins(userId) {
            document.getElementById('coinUserId').value = userId;
            document.getElementById('coinAmount').value = 100;
            document.getElementById('coinReason').value = 'Bonus from admin';
            addCoins();
        }

        async function loadCoinTransactions() {
            const userId = document.getElementById('filterUserId').value;
            showLoading(true);
            try {
                const res = await fetch(`${BASE_API}/api/admin/coin-transactions`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, userId }) });
                const data = await res.json();
                if (data.success && data.transactions) {
                    document.getElementById('transactionsList').innerHTML = data.transactions.map(t => `
                        <div class="list-item">
                            <div>💰 ${t.amount > 0 ? '+' : ''}${t.amount} coins | ${t.type}</div>
                            <div style="font-size: 12px;">User: ${t.user_id} | ${t.reason || '-'}</div>
                            <div style="font-size: 10px;">${new Date(t.created_at).toLocaleString()}</div>
                        </div>
                    `).join('');
                    if (data.transactions.length === 0) document.getElementById('transactionsList').innerHTML = '<div class="alert alert-info">No transactions found</div>';
                }
            } catch(e) { console.error(e); } finally { showLoading(false); }
        }

        async function createAnnouncement() {
            const title = document.getElementById('announcementTitle').value;
            const content = document.getElementById('announcementContent').value;
            const type = document.getElementById('announcementType').value;
            if (!title || !content) { alert('Title and content required'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${BASE_API}/api/admin/create-announcement`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, title, content, type }) });
                const data = await res.json();
                if (data.success) { alert('Announcement created'); loadAnnouncements(); }
                else { alert(data.error); }
            } catch(e) { alert('Error'); } finally { showLoading(false); }
        }

        async function loadAnnouncements() {
            try {
                const res = await fetch(`${BASE_API}/api/admin/announcements`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
                const data = await res.json();
                if (data.success && data.announcements) {
                    document.getElementById('announcementsList').innerHTML = data.announcements.map(a => `
                        <div class="list-item">
                            <div><strong>${a.title}</strong> <span class="badge badge-active">${a.type}</span></div>
                            <div>${a.content}</div>
                            <div style="font-size: 10px;">Created: ${new Date(a.created_at).toLocaleString()}</div>
                            <button class="btn btn-sm btn-danger" onclick="deleteAnnouncement(${a.id})">Delete</button>
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        async function deleteAnnouncement(id) {
            if(confirm('Delete announcement?')){ showLoading(true); await fetch(`${BASE_API}/api/admin/delete-announcement`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, id}) }); loadAnnouncements(); showLoading(false); }
        }

        async function sendBroadcast() {
            const title = document.getElementById('broadcastTitle').value;
            const message = document.getElementById('broadcastMessage').value;
            const targetRole = document.getElementById('broadcastTarget').value;
            if (!title || !message) { alert('Title and message required'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${BASE_API}/api/admin/broadcast`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, title, message, targetRole }) });
                const data = await res.json();
                if (data.success) { alert(`Broadcast sent to ${data.totalSent} users`); loadBroadcastHistory(); }
                else { alert(data.error); }
            } catch(e) { alert('Error'); } finally { showLoading(false); }
        }

        async function loadBroadcastHistory() {
            try {
                const res = await fetch(`${BASE_API}/api/admin/broadcast-history`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
                const data = await res.json();
                if (data.success && data.broadcasts) {
                    document.getElementById('broadcastHistoryList').innerHTML = data.broadcasts.map(b => `
                        <div class="list-item">
                            <div><strong>${b.title}</strong> | Target: ${b.target_role} | Sent: ${b.total_sent}</div>
                            <div>${b.message}</div>
                            <div style="font-size: 10px;">${new Date(b.created_at).toLocaleString()}</div>
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        async function checkMaintenanceStatus() {
            try {
                const res = await fetch(`${BASE_API}/api/admin/maintenance/settings`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('maintenanceStatus').innerHTML = data.settings.maintenance_mode === 'true' 
                        ? `<div class="alert alert-warning">⚠️ MAINTENANCE ACTIVE<br>${data.settings.maintenance_message}<br>Est: ${data.settings.maintenance_estimated_time}</div>`
                        : `<div class="alert alert-success">✅ System Online</div>`;
                }
            } catch(e) { console.error(e); }
        }

        async function enableMaintenance() {
            const msg = document.getElementById('maintenanceMessage').value;
            const time = document.getElementById('maintenanceTime').value;
            await fetch(`${BASE_API}/api/admin/maintenance/enable`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, message:msg, estimatedTime:time}) });
            checkMaintenanceStatus();
        }

        async function disableMaintenance() {
            await fetch(`${BASE_API}/api/admin/maintenance/disable`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token}) });
            checkMaintenanceStatus();
        }

        function switchTab(tab) {
            const panels = document.querySelectorAll('.tab-panel');
            const btns = document.querySelectorAll('.tab-btn');
            panels.forEach(p => p.classList.remove('active'));
            btns.forEach(b => b.classList.remove('active'));
            const tabMap = { keys:'tabKeys', resellers:'tabResellers', coins:'tabCoins', announcements:'tabAnnouncements', broadcast:'tabBroadcast', maintenance:'tabMaintenance' };
            document.getElementById(tabMap[tab]).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'resellers') loadResellers();
            if (tab === 'coins') loadCoinTransactions();
            if (tab === 'announcements') loadAnnouncements();
            if (tab === 'broadcast') loadBroadcastHistory();
        }

        const savedToken = localStorage.getItem('admin_token');
        if (savedToken) { token = savedToken; document.getElementById('loginPanel').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; loadStats(); loadKeys(); loadResellers(); loadAnnouncements(); loadBroadcastHistory(); checkMaintenanceStatus(); }
    </script>
</body>
</html>
